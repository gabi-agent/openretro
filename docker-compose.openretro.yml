services:
  openretro-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: openretro-backend
    ports:
      - "9982:9982"
    volumes:
      - ./openretro.db:/app/openretro.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9982/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
